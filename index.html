document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

roke=\"currentColor\" stroke-width=\"1.7\"><path d=\"M5 12h11M12 5l7 7-7 7\"/><\u002Fsvg>' } },\n];\n\nconst MAPS_URL = \"https://www.google.com/maps/search/?api=1&query=Via+Asseggiano+211+30174+Asseggiano+VE\";\nconst PHONE = \"393488215979\";\nconst MSG_YES = \"Ciao Anna! 🎉 Ci sarò sicuramente al tuo compleanno di venerdì 10 luglio! Non vedo l'ora di festeggiare insieme a te 💛\";\nconst MSG_NO = \"Ciao Anna, mi dispiace ma non riuscirò a essere presente al tuo compleanno del 10 luglio. Ti penserò comunque, buona festa! 💛\";\nconst waLink = (msg) => \"https://wa.me/\" + PHONE + \"?text=\" + encodeURIComponent(msg);\n\n// evento: giovedì 10 luglio 2025, 19:00–23:00\nconst CAL_URL = \"https://calendar.google.com/calendar/render?action=TEMPLATE\"\n  + \"&text=\" + encodeURIComponent(\"Compleanno di Anna 🎉\")\n  + \"&dates=20260710T190000/20260710T230000\"\n  + \"&location=\" + encodeURIComponent(\"Via Asseggiano, 211, 30174 Asseggiano VE\")\n  + \"&details=\" + encodeURIComponent(\"Festa in giardino ad Asseggiano. Ti aspetto! 💛\");\n\nconst PALETTES = {\n  \"Oro & salvia\": { title: \"#9a7526\", accent: \"#c98a95\", accentSoft: \"#e2bcc3\", btn: \"#8b9c7e\", btnDark: \"#6f8162\" },\n  \"Salvia & rosa cipria\": { title: \"#b97e8c\", accent: \"#c98a95\", accentSoft: \"#e6c3ca\", btn: \"#8b9c7e\", btnDark: \"#6f8162\" },\n  \"Rosa cipria\":  { title: \"#c0788f\", accent: \"#cf6f85\", accentSoft: \"#e2aebb\", btn: \"#c47f8e\", btnDark: \"#a5657a\" },\n  \"Lavanda\":      { title: \"#7d6ea8\", accent: \"#9a72ad\", accentSoft: \"#c6b3d8\", btn: \"#8073ad\", btnDark: \"#635189\" },\n};\nconst ATMOSFERE = {\n  \"Giorno\":   { bg1: \"#fbf6ec\", bg2: \"#f3ecdc\", glow: \"rgba(242,193,78,.75)\", glowBlur: \"9px\" },\n  \"Tramonto\": { bg1: \"#fdeede\", bg2: \"#f4d8bf\", glow: \"rgba(255,175,85,.95)\", glowBlur: \"14px\" },\n  \"Sera\":     { bg1: \"#efe6d6\", bg2: \"#d8ccb6\", glow: \"rgba(255,205,110,1)\", glowBlur: \"22px\" },\n};\nconst ABBONDANZA = {\n  \"Delicato\":   { lights: 7,  bgFloral: 0.26, bgFloralTop: 0, petals: false },\n  \"Naturale\":   { lights: 9,  bgFloral: 0.38, bgFloralTop: 0, petals: false },\n  \"Rigoglioso\": { lights: 11, bgFloral: 0.55, bgFloralTop: 0, petals: true },\n};\n\nfunction makeLights(n) {\n  return Array.from({ length: n }).map((_, i) => ({ dur: 1.7 + (i % 3) * 0.35, delay: (i * 0.19).toFixed(2) }));\n}\nfunction lightStyle(l, lit) {\n  const base = \"width:9px;height:12px;border-radius:0 0 50% 50%/0 0 60% 60%;background:radial-gradient(circle at 50% 35%,#fff6d0,#f2c14e 70%);cursor:pointer;transition:transform .3s,box-shadow .3s,opacity .3s;\";\n  if (lit) return base + \"opacity:1;transform:scale(2);box-shadow:0 0 26px 9px var(--glow,rgba(242,193,78,.95));animation:none;\";\n  return base + \"box-shadow:0 0 var(--glowBlur,9px) 2px var(--glow,rgba(242,193,78,.7));animation:twinkle \" + l.dur + \"s ease-in-out infinite;animation-delay:\" + l.delay + \"s;\";\n}\nfunction makeConfetti() {\n  const colors = [\"#e0433a\", \"#3f7fb0\", \"#e9c93f\", \"#6b9a3f\", \"#cf6f85\", \"#9a7526\", \"#b06fb0\"];\n  const arr = [];\n  for (let i = 0; i < 30; i++) arr.push({ x: Math.round(Math.random() * 97), color: colors[i % colors.length], radius: i % 3 === 0 ? \"50%\" : \"1px\", dur: (1.8 + Math.random() * 1.4).toFixed(2), delay: (Math.random() * 0.5).toFixed(2) });\n  return arr;\n}\nfunction makePetals() {\n  const colors = [\"#e7b7c4\", \"#f0d68a\", \"#c9d6b0\", \"#e2aebb\", \"#b7c79a\"];\n  const arr = [];\n  for (let i = 0; i < 16; i++) arr.push({ x: Math.round(Math.random() * 97), color: colors[i % colors.length], size: 7 + Math.round(Math.random() * 5), sizeH: 9 + Math.round(Math.random() * 5), dur: (7 + Math.random() * 6).toFixed(1), delay: (Math.random() * 8).toFixed(1) });\n  return arr;\n}\n\nclass Component extends DCLogic {\n  state = { titleBump: 0, burst: false, rsvp: null, saved: false, allLit: false };\n\n  lightAll() {\n    this.setState({ allLit: true });\n    clearTimeout(this._la);\n    this._la = setTimeout(() => this.setState({ allLit: false }), 1800);\n  }\n\n  bump(key) {\n    this.setState({ [key]: this.state[key] + 1 });\n    clearTimeout(this[\"_t_\" + key]);\n    this[\"_t_\" + key] = setTimeout(() => this.setState({ [key]: 0 }), 700);\n  }\n  fireBurst() {\n    this.setState({ burst: true });\n    clearTimeout(this._tb);\n    this._tb = setTimeout(() => this.setState({ burst: false }), 2400);\n  }\n\n  renderVals() {\n    const P = this.props || {};\n    const pal = PALETTES[P.palette] || PALETTES[\"Oro & salvia\"];\n    const atm = ATMOSFERE[P.atmosfera] || ATMOSFERE[\"Giorno\"];\n    const ab = ABBONDANZA[P.abbondanza] || ABBONDANZA[\"Naturale\"];\n    const inv = P.invito || \"Femminile\";\n\n    const themeVars = [\n      \"--bg1:\" + atm.bg1, \"--bg2:\" + atm.bg2, \"--glow:\" + atm.glow, \"--glowBlur:\" + atm.glowBlur,\n      \"--title:\" + pal.title, \"--accent:\" + pal.accent, \"--accentSoft:\" + pal.accentSoft, \"--btn:\" + pal.btn,\n      \"--bgFloral:\" + ab.bgFloral, \"--bgFloralTop:\" + ab.bgFloralTop,\n    ].join(\";\");\n\n    const greetingLine = inv === \"Maschile\" ? \"SEI INVITATO AL MIO\" : (inv === \"Plurale\" ? \"SIETE INVITATI AL MIO\" : \"SEI INVITATA AL MIO\");\n\n    return {\n      themeVars,\n      greetingLine,\n      lights: makeLights(ab.lights).map((l) => ({ style: lightStyle(l, this.state.allLit), onTap: () => this.lightAll() })),\n      sideLights: makeLights(6).map((l) => ({ style: lightStyle(l, this.state.allLit), onTap: () => this.lightAll() })),\n      directions: DIRECTIONS,\n      mapsUrl: MAPS_URL,\n\n      titleTransform: this.state.titleBump ? \"scale(1.07) rotate(-1.5deg)\" : \"scale(1) rotate(0deg)\",\n      onTapTitle: () => this.bump(\"titleBump\"),\n      onTapHeart: () => this.fireBurst(),\n\n      calLabel: this.state.saved ? \"Aggiunto! Controlla il calendario\" : \"Tocca per salvare nel calendario\",\n      onAddCalendar: () => { this.setState({ saved: true }); window.open(CAL_URL, \"_blank\"); },\n\n      showPetals: ab.petals,\n      petals: ab.petals ? makePetals() : [],\n\n      burst: this.state.burst,\n      confetti: this.state.burst ? makeConfetti() : [],\n\n      rsvpYesBg: this.state.rsvp === \"yes\" ? pal.btnDark : pal.btn,\n      rsvpNoBg: this.state.rsvp === \"no\" ? \"#ece0c6\" : \"#f3ecdc\",\n      rsvpMsg: this.state.rsvp === \"yes\"\n        ? \"Che bello! Apro WhatsApp per confermare 💛\"\n        : (this.state.rsvp === \"no\" ? \"Peccato! Apro WhatsApp per avvisare.\" : null),\n      onRsvpYes: () => { this.setState({ rsvp: \"yes\" }); this.fireBurst(); setTimeout(() => window.open(waLink(MSG_YES), \"_blank\"), 300); },\n      onRsvpNo: () => { this.setState({ rsvp: \"no\" }); setTimeout(() => window.open(waLink(MSG_NO), \"_blank\"), 150); },\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
